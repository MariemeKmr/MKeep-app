# MySQL local + Adminer pour développer sans rien installer.
# Usage : docker compose up -d
services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mkeep
      MYSQL_USER: mkeep
      MYSQL_PASSWORD: mkeep
    ports:
      - "3306:3306"
    volumes:
      - mkeep_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  mkeep_mysql:
